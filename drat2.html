<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width-device-width" , initial-scale="1.0" />
    <title>Admin Page</title>
    <link rel="stylesheet" href="./style2.css" />
</head>

<body>
    <main class="profile-page">
        <section class="profile-card">
            <div class="profile-info">
            <div class="profile-pic">
            </div>
            <div class="user-details">
                <h2>name</h2>
                <p>username</p>
            </div>
        </div>
    <div class="divider"></div>

    <div class="profile-options">
        <button>Member since 2019</button>
        <button>Past Orders</button>
        <button>Reservation Options</button>
        <button>Share Reservation</button>
        <button>Account Settings</button>
    </div>

    <button class="fav-button">Favorites</button>
        </section>

    <section class="stats">
        <h1>Your Stats</h1>
        <div class="stats-grid">
            <div class="card">Saved Restaurants</div>
            <div class="card">Reviews</div>
            <div class="card">Photos</div>
            <div class="card">Special Requests</div>
            <div class="card">About You</div>
            <div class="card">Updates</div>
        </div>
    </section>
    </main>
</body>
</html>
