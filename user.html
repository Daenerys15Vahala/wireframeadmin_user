<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./styleu.css">
</head>

<body>

    <div class="profile">
        <div class="card">
            <img src="./images.jpg" alt="Avatar">
            <div class="profile-info">
                <h4><b>Name</b></h4>
                <p>Username</p>
            </div>
        </div>

        <div class="dashboard">
            <a href="#">Member since 2019</a>
            <a href="#">Past Orders</a>
            <a href="#">Reservation Options</a>
            <a href="#">Share</a>
            <a href="#">Account Settings</a>
        </div>

        <div class="stats">
            <h2>Your Stats</h2>
            <div class="stats-top">
                <div>
                    <p>Saved Restaurants</p>
                    <p>Reviews</p>
                    <p>Photos</p>
                </div>
                <div class="stats-bottom">
                    <p>Special requests</p>
                    <p>About you</p>
                    <p>Updates</p>
                </div>
            </div>


</body>
</html>
