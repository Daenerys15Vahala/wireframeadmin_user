<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width-device-width" , initial-scale="1.0" />
    <title>Admin Page</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <a href="#home">Fratushka Cafe</a>
            <a href="#admin">Admin</a>
            <p>v********2946</p>
            <a href="#dashboard">Dashboard</a>
            <a href="#sales">Sales</a>
            <a href="#reports">Reports</a>
            <a href="#members">Members</a>
            <a href="#orders">Orders</a>
            <a href="#transactions">Transactions</a>
            <a href="#inventory">Inventory</a>
            <a href="#payroll">Payroll</a>
            <a href="#employeeportal">Employee Portal</a>
            <a href="#charts">Charts</a>
            <a href="#settings">Settings</a>
        </aside>

        <main class="dashboard">
            <header class="topbar">
                <img src="./logo_coffee.png" class="topbar-logo" alt="Fratushka Cafe Logo" />
                <input type="text" placeholder="Search..." />
            </header>

        <section class="cards">
            <div class="earning">Earnings (monthly):</div>
            <div class="earnings">Earnings (annual):</div>
            <div class="tasks">Tasks:</div>
            <div class="pending">Pending Requests:</div>
        </section>

        <section class="charts">
            <img src="./graph.png" class="charts" alt="Logo" />
        </section>

        <section class="bottom-cards">
            <div>Revenue</div>
            <div>Truck</div>
        </section>

        <footer class="footer">
            <button class="logout-button">Logout</button>
            <p>Copyright &copy; 2024 Fratushka Cafe. All rights reserved.</p>
        </footer>
        </main>
    </div>
</body>
</html>
